# legion-server-bridge — runs alongside a Codec-aware HTTP server
# (sglang / vLLM / llama.cpp with wdunn001 codec patches) and joins
# an Unstable Legion mesh as a headless peer.
#
# Network: `network_mode: host` is required for node-datachannel to
# perform WebRTC ICE correctly. Docker's default bridge networking
# adds an extra NAT layer that mangles ICE candidate IPs and prevents
# peer-to-peer connections from establishing across the open internet.
# In host mode the container binds directly to the host's network
# stack, so STUN-discovered candidates are reachable from remote peers.
#
# Adjust `LEGION_CODEC_URL` if the Codec server is on a different host.
# In host mode, `127.0.0.1:30000` reaches a Codec server bound to
# the host's localhost.

services:
  legion-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legion-server-bridge
    restart: unless-stopped
    network_mode: host
    environment:
      LEGION_APP_ID: ${LEGION_APP_ID:-unstable-legion-demo-v0}
      LEGION_ROOM_ID: ${LEGION_ROOM_ID:-legion-demo}
      LEGION_NICK: ${LEGION_NICK:-sglang-gw}
      LEGION_MODEL_ID: ${LEGION_MODEL_ID:-Qwen/Qwen2.5-0.5B-Instruct}
      LEGION_MAP_ID: ${LEGION_MAP_ID:-qwen/qwen2}
      LEGION_CODEC_URL: ${LEGION_CODEC_URL:-http://127.0.0.1:30000}
      LEGION_SKILLS: ${LEGION_SKILLS:-chat,agent}
      LEGION_AUTHORITATIVE: ${LEGION_AUTHORITATIVE:-chat,language.en,reasoning}
      LEGION_DELEGATING: ${LEGION_DELEGATING:-}
      LEGION_SYSTEM_PROMPT: ${LEGION_SYSTEM_PROMPT:-Headless mesh peer backed by a Codec-aware HTTP server.}
